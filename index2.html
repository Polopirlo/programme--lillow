    if (navigator.share) {
      try {
        await navigator.share({ title: "Lillow® — Sérum Anti-Repousse", text: shareText });

        setTimeout(() => setShared(false), 3000);
      } catch (e) { /* user cancelled */ }

      try {

        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);

function Quiz({ onComplete, existing }) {
  const [step, setStep] = useState(0);
  const [ans, setAns] = useState({});
  const [anim, setAnim] = useState(false);
  const [txt, setTxt] = useState("");
  const [multi, setMulti] = useState([]);
  const [loading, setLoading] = useState(false);
  const [ls, setLs] = useState(0);

  if (existing) return (
    <div style={{ background: B.pageBg, minHeight: "100vh" }}>
      <div style={{ background: "#fff", padding: "18px 20px", borderBottom: `1px solid ${B.border}` }}><span style={{ fontFamily: fontS, fontSize: 18, fontWeight: 700, color: B.purple }}>Lillow®</span></div>
      <div style={{ padding: "40px 20px", textAlign: "center" }}><div style={{ fontSize: 48, marginBottom: 14 }}>✅</div><h2 style={{ fontFamily: fontS, fontSize: 20, color: B.text, margin: "0 0 8px" }}>Diagnostic complété</h2><p style={{ fontSize: 13, color: B.textSoft }}>Protocole actif, {existing.name}.</p></div>
    </div>
  );

  if (loading) {
    const steps = ["Analyse du profil...", "Score de repousse...", `Protocole pour ${ans.name || "vous"}...`, "Calendrier 90 jours...", "Programme prêt !"];
    return (
      <div style={{ minHeight: "100vh", background: "#fff", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>
        <div style={{ width: 44, height: 44, borderRadius: "50%", border: `3px solid ${B.border}`, borderTopColor: B.purple, animation: "sp .8s linear infinite", marginBottom: 24 }} />
        <style>{`@keyframes sp{to{transform:rotate(360deg)}}`}</style>
        {steps.map((s, i) => <p key={i} style={{ fontSize: 13, color: i <= ls ? B.text : "#D1D5DB", margin: "4px 0", fontWeight: i === ls ? 600 : 400, fontFamily: font }}>{i < ls ? "✓" : i === ls ? "●" : "○"} {s}</p>)}
      </div>
    );
  }

  const cur = QUESTIONS[step];
  const realQs = QUESTIONS.filter(q => q.type !== "info");
  const pIdx = QUESTIONS.slice(0, step + 1).filter(q => q.type !== "info").length;
  const pct = Math.round((pIdx / realQs.length) * 100);

  const next = v => {
    const na = cur.type !== "info" ? { ...ans, [cur.id]: v } : ans;
    if (cur.type !== "info") setAns(na);
    setAnim(true);
    setTimeout(() => {
      if (step < QUESTIONS.length - 1) { setStep(step + 1); setTxt(""); setMulti([]); }
      else { setLoading(true); let s = 0; const iv = setInterval(() => { s++; setLs(s); if (s >= 4) { clearInterval(iv); setTimeout(() => onComplete(na), 600); } }, 700); }
      setAnim(false);
    }, 200);
  };

  const toggleM = v => { if (v === "none") setMulti(["none"]); else setMulti(p => { const f = p.filter(x => x !== "none"); return f.includes(v) ? f.filter(x => x !== v) : [...f, v]; }); };

  return (
    <div style={{ minHeight: "100vh", background: "#fff" }}>
      <div style={{ padding: "14px 20px 0" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ fontFamily: fontS, fontSize: 16, fontWeight: 700, color: B.purple }}>Lillow®</span>
          {step > 0 && <button onClick={() => { setStep(step - 1); setAnim(false); }} style={{ background: "none", border: "none", fontSize: 13, color: B.textMuted, cursor: "pointer", fontFamily: font }}>← Retour</button>}
        </div>
        <div style={{ height: 3, background: B.border, borderRadius: 2 }}><div style={{ height: "100%", width: `${pct}%`, background: B.purple, borderRadius: 2, transition: "width 0.4s" }} /></div>
      </div>
      <div style={{ padding: "16px 20px 90px", opacity: anim ? 0 : 1, transform: anim ? "translateX(14px)" : "none", transition: "all 0.2s" }}>
        {cur.type === "info" ? (
          <div style={{ paddingTop: 36, textAlign: "center" }}>
            <div style={{ width: 42, height: 42, borderRadius: "50%", background: B.purpleSoft, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 14px", fontSize: 18 }}>💡</div>
            <h2 style={{ fontFamily: fontS, fontSize: 20, color: B.text, margin: "0 0 10px" }}>{cur.title}</h2>
            <p style={{ fontSize: 13, color: B.textSoft, lineHeight: 1.8, maxWidth: 340, margin: "0 auto 6px" }}>{cur.text}</p>
            {cur.src && <p style={{ fontSize: 11, color: B.textMuted, fontStyle: "italic" }}>{cur.src}</p>}
            <button onClick={() => next(null)} style={{ marginTop: 22, background: B.purple, color: "#fff", border: "none", padding: "12px 36px", borderRadius: 12, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: font }}>Continuer</button>
          </div>
        ) : (
          <>
            <h2 style={{ fontFamily: fontS, fontSize: 20, color: B.text, margin: "0 0 4px", lineHeight: 1.3 }}>{cur.q}</h2>
            {cur.sub && <p style={{ fontSize: 12, color: B.textMuted, margin: "0 0 18px" }}>{cur.sub}</p>}
            {cur.type === "text" && <>
              <input value={txt} onChange={e => setTxt(e.target.value)} placeholder={cur.ph} onKeyDown={e => { if (e.key === "Enter" && txt.trim().length >= 2) next(txt.trim()); }} style={{ width: "100%", boxSizing: "border-box", fontSize: 16, padding: "13px 16px", border: `1.5px solid ${B.border}`, borderRadius: 12, background: B.pageBg, outline: "none", color: B.text, fontFamily: font }} onFocus={e => e.target.style.borderColor = B.purple} onBlur={e => e.target.style.borderColor = B.border} />
              <button onClick={() => { if (txt.trim().length >= 2) next(txt.trim()); }} disabled={txt.trim().length < 2} style={{ marginTop: 12, width: "100%", background: txt.trim().length >= 2 ? B.purple : "#E5E7EB", color: "#fff", border: "none", padding: "13px", borderRadius: 12, fontSize: 14, fontWeight: 600, cursor: txt.trim().length >= 2 ? "pointer" : "default", fontFamily: font }}>Continuer</button>
            </>}
            {cur.type === "choice" && <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>{cur.opts.map(o => <button key={o.v} onClick={() => next(o.v)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "13px 16px", background: "#fff", border: `1.5px solid ${B.border}`, borderRadius: 12, cursor: "pointer", fontSize: 14, color: B.text, fontWeight: 500, fontFamily: font }} onMouseEnter={e => { e.currentTarget.style.borderColor = B.purple; e.currentTarget.style.background = B.purpleSoft; }} onMouseLeave={e => { e.currentTarget.style.borderColor = B.border; e.currentTarget.style.background = "#fff"; }}><span style={{ fontSize: 20 }}>{o.i}</span>{o.l}</button>)}</div>}
            {cur.type === "multi" && <>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>{cur.opts.map(o => { const sel = multi.includes(o.v); return <button key={o.v} onClick={() => toggleM(o.v)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "13px 16px", background: sel ? B.purpleSoft : "#fff", border: `1.5px solid ${sel ? B.purple : B.border}`, borderRadius: 12, cursor: "pointer", fontSize: 14, color: B.text, fontWeight: 500, fontFamily: font }}><span style={{ width: 20, height: 20, borderRadius: 5, border: `2px solid ${sel ? B.purple : "#D1D5DB"}`, background: sel ? B.purple : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, color: "#fff", flexShrink: 0 }}>{sel ? "✓" : ""}</span><span style={{ fontSize: 18 }}>{o.i}</span>{o.l}</button>; })}</div>
              <button onClick={() => { if (multi.length) next(multi); }} disabled={!multi.length} style={{ marginTop: 12, width: "100%", background: multi.length ? B.purple : "#E5E7EB", color: "#fff", border: "none", padding: "13px", borderRadius: 12, fontSize: 14, fontWeight: 600, cursor: multi.length ? "pointer" : "default", fontFamily: font }}>Valider</button>
            </>}
          </>
        )}
      </div>
    </div>
  );
}

// ─── CALENDAR ───
function CalendarPage({ ans, cal, setCal, start }) {
  const today = todayStr();
  const dayIdx = start ? Math.max(0, Math.floor((new Date(today) - new Date(start)) / 86400000)) : 0;
  const totalC = Object.values(cal).filter(Boolean).length;
  const maxC = Math.max(1, (dayIdx + 1) * 2);
  const adh = Math.round((totalC / maxC) * 100);

  const toggle = (ds, p) => { if (ds !== today) return; const k = `${ds}-${p}`; setCal(prev => ({ ...prev, [k]: !prev[k] })); };

  return (
    <div style={{ background: B.pageBg, minHeight: "100vh" }}>
      <div style={{ background: "#fff", padding: "18px 20px", borderBottom: `1px solid ${B.border}` }}>
        <span style={{ fontFamily: fontS, fontSize: 16, fontWeight: 700, color: B.purple }}>Lillow®</span>
        <h1 style={{ fontFamily: fontS, fontSize: 20, color: B.text, margin: "6px 0 0" }}>Calendrier 90 jours</h1>
        <p style={{ fontSize: 12, color: B.textMuted, margin: "2px 0 0" }}>Jour {dayIdx + 1}/90 — Adhérence : {adh}%</p>
      </div>

      <div style={{ padding: "14px 16px 90px" }}>
        <Card>
          <div style={{ fontSize: 13, fontWeight: 600, color: B.text, marginBottom: 10 }}>Aujourd'hui — Jour {dayIdx + 1}</div>
          <div style={{ display: "flex", gap: 8 }}>
            {[{ p: "am", l: "Matin", e: "☀️" }, { p: "pm", l: "Soir", e: "🌙" }].map(x => {
              const ok = cal[`${today}-${x.p}`];
              return (
                <button key={x.p} onClick={() => toggle(today, x.p)} style={{ flex: 1, background: ok ? B.successBg : B.pageBg, border: `2px solid ${ok ? B.success : B.border}`, borderRadius: 12, padding: "16px 10px", cursor: "pointer", textAlign: "center" }}>
                  <div style={{ fontSize: 24 }}>{ok ? "✅" : x.e}</div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: ok ? B.success : B.textSoft, marginTop: 4 }}>{x.l}</div>
                  <div style={{ fontSize: 10, color: ok ? B.success : B.textMuted, marginTop: 2 }}>{ok ? "Validé !" : "Appuyer pour valider"}</div>
                </button>
              );
            })}
          </div>
          <p style={{ fontSize: 10, color: B.textMuted, textAlign: "center", margin: "8px 0 0", fontStyle: "italic" }}>⚠️ Seul le jour en cours peut être validé</p>
        </Card>

        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 5 }}>
            <span style={{ color: B.textMuted }}>Adhérence</span>
            <span style={{ fontWeight: 700, color: adh >= 80 ? B.success : adh >= 50 ? B.warn : B.error }}>{adh}%</span>
          </div>
          <div style={{ height: 6, background: B.border, borderRadius: 3 }}>
            <div style={{ height: "100%", width: `${adh}%`, background: adh >= 80 ? B.success : adh >= 50 ? B.warn : B.error, borderRadius: 3, transition: "width 0.5s" }} />
          </div>
        </Card>

        {Array.from({ length: 13 }, (_, wi) => {
          const ph = PHASES[Math.min(Math.floor(wi / 2), 5)];
          const newPh = wi % 2 === 0 && wi < 12;
          return (
            <div key={wi}>
              {newPh && <div style={{ display: "flex", alignItems: "center", gap: 8, margin: "12px 0 6px", padding: "6px 10px", background: B.purpleSoft, borderRadius: 8 }}><span style={{ fontSize: 14 }}>{ph.icon}</span><div><div style={{ fontSize: 10, fontWeight: 600, color: B.purple }}>{ph.week}</div><div style={{ fontSize: 11, fontWeight: 600, color: B.text }}>{ph.label}</div></div></div>}
              <Card style={{ padding: "10px" }}>
                <div style={{ fontSize: 9, fontWeight: 600, color: B.textMuted, marginBottom: 5 }}>S{wi + 1}</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3 }}>
                  {Array.from({ length: 7 }, (_, d) => {
                    const day = wi * 7 + d;
                    if (day >= 90) return <div key={d} />;
                    const ds = dayToDate(start, day);
                    const isT = ds === today, past = ds < today, fut = ds > today;
                    const am = cal[`${ds}-am`], pm = cal[`${ds}-pm`];
                    const both = am && pm, partial = (am || pm) && !both;
                    let bg = "#fff", bc = B.border;
                    if (both) { bg = B.successBg; bc = B.success; } else if (partial) { bg = B.warnBg; bc = B.warn; } else if (past) { bg = B.errorBg; bc = "#FCA5A5"; }
                    if (isT) bc = B.purple;
                    return (
                      <div key={d} style={{ textAlign: "center" }}>
                        <div style={{ fontSize: 8, color: isT ? B.purple : B.textMuted, fontWeight: isT ? 700 : 400, marginBottom: 2 }}>{isT ? "Auj" : day + 1}</div>
                        <div style={{ width: "100%", aspectRatio: "1", borderRadius: 5, border: `1.5px solid ${bc}`, background: bg, display: "flex", alignItems: "center", justifyContent: "center", fontSize: both ? 9 : 7, color: both ? B.success : partial ? B.warn : past ? B.error : B.textMuted, fontWeight: 600, boxShadow: isT ? `0 0 0 2px ${B.purpleLight}` : "none" }}>
                          {both ? "✓✓" : partial ? "½" : fut ? "·" : past ? "✗" : "·"}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </Card>
            </div>
          );
        })}

        <Card>
          <div style={{ fontSize: 9, fontWeight: 600, color: B.textMuted, marginBottom: 5 }}>LÉGENDE</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {[{ bg: B.successBg, bc: B.success, l: "2 ✓" }, { bg: B.warnBg, bc: B.warn, l: "1 appli" }, { bg: B.errorBg, bc: "#FCA5A5", l: "Manqué" }, { bg: "#fff", bc: B.border, l: "À venir" }].map((x, i) => (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 3 }}>
                <div style={{ width: 12, height: 12, borderRadius: 3, background: x.bg, border: `1.5px solid ${x.bc}` }} />
                <span style={{ fontSize: 10, color: B.textSoft }}>{x.l}</span>
              </div>
            ))}
          </div>
        </Card>
      </div>
    </div>
  );
}

// ─── MAIN APP ───
function App() {
  const [tab, setTab] = useState("home");
  const [ans, setAns] = useState(null);
  const [cal, setCal] = useState({});
  const [start, setStart] = useState(null);
  const [cureOn, setCureOn] = useState(false);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    const a = sG(SK.ans), c = sG(SK.cal), s = sG(SK.start), cu = sG(SK.cure);
    if (a) setAns(a); if (c) setCal(c); if (s) setStart(s); if (cu) setCureOn(true);
    setReady(true);
  }, []);

  useEffect(() => { if (ready && ans) sS(SK.ans, ans); }, [ans, ready]);
  useEffect(() => { if (ready && Object.keys(cal).length) sS(SK.cal, cal); }, [cal, ready]);
  useEffect(() => { if (ready && start) sS(SK.start, start); }, [start, ready]);
  useEffect(() => { if (ready && cureOn) sS(SK.cure, true); }, [cureOn, ready]);

  const quizDone = !!ans;
  const startCure = () => { setCureOn(true); setStart(todayStr()); };

  const handleReset = () => {
    setAns(null); setCal({}); setStart(null); setCureOn(false); setTab("home");
    sS(SK.ans, null); sS(SK.cal, null); sS(SK.start, null); sS(SK.cure, null);
  };

  if (!ready) return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: "#fff" }}><span style={{ fontFamily: fontS, fontSize: 20, color: B.purple }}>Lillow®</span></div>;

  return (
    <div style={{ maxWidth: 480, margin: "0 auto", minHeight: "100vh", background: B.pageBg, paddingBottom: 90, fontFamily: font }}>

      {tab === "home" && <Home ans={ans} cal={cal} start={start} cureOn={cureOn} onNav={setTab} onStartCure={startCure} onReset={handleReset} />}
      {tab === "quiz" && <Quiz onComplete={a => { setAns(a); setTab("home"); }} existing={ans} />}
      {tab === "protocol" && quizDone && <Protocol ans={ans} />}
      {tab === "calendar" && quizDone && cureOn && <CalendarPage ans={ans} cal={cal} setCal={setCal} start={start} />}
      {tab === "calendar" && quizDone && !cureOn && (
        <div style={{ background: B.pageBg, minHeight: "100vh" }}>
          <div style={{ background: "#fff", padding: "18px 20px", borderBottom: `1px solid ${B.border}` }}><span style={{ fontFamily: fontS, fontSize: 16, fontWeight: 700, color: B.purple }}>Lillow®</span><h1 style={{ fontFamily: fontS, fontSize: 20, color: B.text, margin: "6px 0 0" }}>Calendrier 90 jours</h1></div>
          <div style={{ padding: "40px 20px", textAlign: "center" }}><div style={{ fontSize: 40, marginBottom: 14 }}>📦</div><h2 style={{ fontFamily: fontS, fontSize: 20, color: B.text, margin: "0 0 8px" }}>En attente de votre colis</h2><p style={{ fontSize: 13, color: B.textSoft, lineHeight: 1.7, margin: "0 0 20px" }}>Votre calendrier démarre dès réception de votre commande.</p><button onClick={startCure} style={{ background: B.purple, color: "#fff", border: "none", padding: "13px 24px", borderRadius: 12, fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: font }}>📦 J'ai reçu ma commande</button></div>
        </div>
      )}
      {tab === "faq" && quizDone && <FaqPage ans={ans} />}
      {tab === "vip" && quizDone && <Vip ans={ans} />}

      <AddToHomeScreen />
      <Nav active={tab} go={setTab} unlocked={quizDone} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
